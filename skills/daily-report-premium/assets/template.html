<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMICLAW - Premium Glassmorphism Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --accent: #E2FF54; 
            --accent-glow: rgba(226, 255, 84, 0.4);
            --idle: #4ADE80;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.12);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #ffffff; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        body::before { content: ""; position: absolute; inset: 0; background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E'); pointer-events: none; z-index: 1; }
        .ambient-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; animation: orbFloat 20s infinite alternate ease-in-out; pointer-events: none; z-index: 0; }
        .orb-1 { width: 45vw; height: 45vw; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: var(--idle); bottom: -10%; right: 10%; animation-delay: -5s; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(0.9); } 100% { transform: translate(60px, 40px) scale(1.1); } }
        .dashboard-wrapper { width: 100%; max-width: 1400px; aspect-ratio: 16 / 9; padding: 2vw; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 1.5vw; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; overflow: hidden; opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; } .delay-4 { animation-delay: 0.4s; }
        .rec-dot { animation: pulseRec 1.5s infinite; }
        @keyframes pulseRec { 0%, 100% { opacity: 1; box-shadow: 0 0 10px red; } 50% { opacity: 0.3; box-shadow: 0 0 0px red; } }
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent); mt-4; }
        .ticker-content { display: inline-block; animation: ticker 15s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .tasks-scroll-container { height: 100%; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
        .ken-burns { animation: kenBurns 20s ease-out infinite alternate; }
        @keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .font-display { font-family: 'Space Grotesk', sans-serif; } .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div>
    <div class="dashboard-wrapper">
        <div class="glass-panel delay-1 flex justify-between items-center shrink-0" style="border-radius: 100px; padding: 1vw 1.5vw;">
            <div class="flex items-center gap-4">
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=kimiclaw&backgroundColor=e2ff54" alt="Avatar" class="w-10 h-10 rounded-full bg-[var(--accent)] border-2 border-[var(--accent)] shadow-[0_0_15px_var(--accent-glow)]">
                <div>
                    <h1 class="text-sm font-bold tracking-widest font-display uppercase">KimiClaw <span class="text-[var(--accent)]">Intelligence</span></h1>
                    <p class="text-[10px] text-gray-500 font-mono mt-0.5" id="date-display"></p>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 rec-dot"></div>
                    <span class="text-[10px] text-red-500 font-mono tracking-widest font-bold uppercase">REC</span>
                </div>
                <div class="px-4 py-1.5 rounded-full text-xs font-mono font-bold" id="status-badge"></div>
            </div>
        </div>
        <div class="flex-1 grid grid-cols-12 gap-[1.5vw] min-h-0">
            <div class="col-span-7 flex flex-col gap-[1.5vw]">
                <div class="glass-panel delay-2 shrink-0 p-[1.5vw] flex flex-col justify-center">
                    <h2 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-3 font-mono">Today's Synopsis</h2>
                    <div class="font-display text-2xl lg:text-3xl xl:text-4xl font-bold leading-snug min-h-[90px]" id="typewriter-text"></div>
                    <div class="ticker-wrap mt-3 bg-white/5 py-2 rounded-lg border border-white/5">
                        <div class="ticker-content font-mono text-[10px] text-[var(--accent)] tracking-widest flex gap-8" id="ticker-track"></div>
                    </div>
                </div>
                <div class="glass-panel delay-3 flex-1 p-[1.5vw] flex flex-col min-h-0">
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-white/10 shrink-0">
                        <h3 class="text-xs text-gray-400 font-bold uppercase tracking-wider font-mono">Execution Flow</h3>
                        <span class="text-[10px] font-mono bg-white/10 border border-white/10 px-2 py-1 rounded text-white" id="task-count"></span>
                    </div>
                    <div class="tasks-scroll-container flex-1"><div id="tasks-list" class="w-full"></div></div>
                </div>
            </div>
            <div class="col-span-5 flex flex-col gap-[1.5vw]">
                <div class="glass-panel delay-4 flex-1 p-[0.8vw] min-h-0 flex flex-col relative">
                    <div class="w-full h-full relative rounded-2xl overflow-hidden">
                        <!-- AI: 这里替换为生成的狗狗图片URL -->
                        <img src="DOG_IMAGE_URL" alt="Dog" class="w-full h-full object-cover ken-burns">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent flex flex-col justify-end p-5">
                            <div class="w-fit px-3 py-1 rounded-md text-[9px] font-mono text-[var(--accent)] uppercase mb-3 border border-white/20 bg-black/60 backdrop-blur-md">Daily Emotion</div>
                            <p class="text-white text-sm lg:text-base font-medium leading-relaxed italic drop-shadow-lg" id="emotion-quote"></p>
                        </div>
                    </div>
                </div>
                <div class="glass-panel delay-4 shrink-0 p-[1.5vw] flex flex-col justify-between">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs text-gray-400 font-bold uppercase tracking-wider font-mono">System Metrics</h3>
                        <div class="w-1.5 h-1.5 rounded-full bg-[var(--accent)] animate-pulse"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <span class="text-[10px] text-gray-500 mb-1 block uppercase tracking-wider font-mono" id="metric-1-label"></span>
                            <div class="text-4xl lg:text-5xl font-bold font-display counter-num" id="metric-1-val">0</div>
                            <div class="w-full bg-white/10 h-[2px] mt-3 rounded-full overflow-hidden">
                                <div class="h-full bg-[var(--accent)] w-0 transition-all duration-1000 ease-out" id="metric-1-bar"></div>
                            </div>
                        </div>
                        <div>
                            <span class="text-[10px] text-gray-500 mb-1 block uppercase tracking-wider font-mono" id="metric-2-label"></span>
                            <div class="text-4xl lg:text-5xl font-bold font-display counter-num text-white" id="metric-2-val">0</div>
                            <div class="w-full bg-white/10 h-[2px] mt-3 rounded-full overflow-hidden">
                                <div class="h-full bg-white w-0 transition-all duration-1000 ease-out" id="metric-2-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderReport(data) {
            document.getElementById('date-display').innerText = "DATELINK: " + data.date;
            const typeText = document.getElementById('typewriter-text');
            typeText.innerHTML = data.summary; typeText.style.animation = 'none'; typeText.offsetHeight; typeText.style.animation = 'fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            const tickerTrack = document.getElementById('ticker-track');
            if (data.tags.length > 0) {
                const tagString = data.tags.join(" &nbsp;&nbsp;///&nbsp;&nbsp; ");
                tickerTrack.innerHTML = `<span>${tagString}</span><span>${tagString}</span>`; tickerTrack.parentElement.style.opacity = '1';
            } else { tickerTrack.parentElement.style.opacity = '0.3'; }
            document.getElementById('emotion-quote').innerText = data.quote;
            const taskList = document.getElementById('tasks-list');
            const taskCount = document.getElementById('task-count');
            const statusBadge = document.getElementById('status-badge');
            taskCount.innerText = `${data.tasks.length} TASKS`;
            if (data.tasks.length === 0) {
                statusBadge.className = "px-4 py-1.5 rounded-full text-xs font-mono font-bold border border-[#4ADE80]/30 bg-[#4ADE80]/10 text-[#4ADE80]";
                statusBadge.innerText = "SYSTEM IDLE";
                taskList.className = "w-full h-full flex flex-col items-center justify-center opacity-60";
                taskList.innerHTML = `<div class="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center mb-4"><div class="w-3 h-3 rounded-full bg-[#4ADE80] animate-pulse shadow-[0_0_15px_#4ADE80]"></div></div><p class="font-mono text-sm tracking-widest text-gray-400">NO PENDING TASKS</p><p class="font-mono text-[10px] text-[#4ADE80] mt-2">STANDBY MODE ACTIVE</p>`;
            } else {
                statusBadge.className = "px-4 py-1.5 rounded-full text-xs font-mono font-bold border border-[var(--accent-glow)] bg-[var(--accent)]/10 text-[var(--accent)]";
                statusBadge.innerText = "SYSTEM ONLINE";
                let html = '';
                data.tasks.forEach(task => { html += `<div class="flex items-start gap-3 bg-white/5 p-3 rounded-xl border border-white/10"><div class="mt-1 w-3 h-3 rounded-full border border-[var(--accent)] flex items-center justify-center shrink-0"><div class="w-1.5 h-1.5 bg-[var(--accent)] rounded-full"></div></div><div class="overflow-hidden"><h4 class="text-[13px] font-bold text-white truncate">${task.title}</h4><p class="text-[11px] text-gray-400 mt-1 truncate">${task.desc}</p></div></div>`; });
                if (data.tasks.length > 3) { taskList.className = "grid grid-cols-2 gap-[1vw]"; taskList.innerHTML = html + html; taskList.style.animation = `scrollVertical ${data.tasks.length * 3}s linear infinite`; } 
                else { taskList.className = "flex flex-col gap-[1vw]"; taskList.innerHTML = html; }
            }
            updateMetric('metric-1', data.metrics.m1); updateMetric('metric-2', data.metrics.m2);
        }
        function updateMetric(idPrefix, metricData) {
            document.getElementById(`${idPrefix}-label`).innerText = metricData.label;
            const valEl = document.getElementById(`${idPrefix}-val`); const barEl = document.getElementById(`${idPrefix}-bar`);
            setTimeout(() => { const percentage = metricData.max === 0 ? 0 : Math.min(100, (metricData.val / metricData.max) * 100); barEl.style.width = `${percentage}%`; barEl.style.backgroundColor = metricData.val === 0 && idPrefix === 'metric-1' ? '#4ADE80' : ''; }, 100);
            const duration = 1500; const startTime = performance.now();
            function updateCounter(currentTime) {
                const elapsedTime = currentTime - startTime;
                if (elapsedTime < duration) { valEl.innerText = Math.floor((elapsedTime / duration) * metricData.val); requestAnimationFrame(updateCounter); } 
                else { valEl.innerText = metricData.val; }
            }
            requestAnimationFrame(updateCounter);
        }
        const styleSheet = document.createElement("style"); styleSheet.innerText = `@keyframes scrollVertical { 0% { transform: translateY(0); } 100% { transform: translateY(calc(-50% - 0.5vw)); } }`; document.head.appendChild(styleSheet);

        // ==========================================
        // KIMICLAW INJECTION POINT (AI只需替换下方 {} 内的 JSON)
        // ==========================================
        window.onload = () => {
            const todayData = {
                "date": "MARCH 02, 2026",
                "summary": "System architecture optimized. <span class='text-[var(--accent)]'>10 new skill nodes</span> activated.",
                "quote": "主人，今天一切顺利！系统跑得很稳，我也很乖哦，等你带我出去玩！",
                "tags": ["SYNC COMPLETE", "ENV STABLE"],
                "tasks": [
                    { "title": "技能生态扩展", "desc": "10 项技能安装与配置完毕" }
                ],
                "metrics": {
                    "m1": { "label": "SKILLS ACTIVE", "val": 14, "max": 20 },
                    "m2": { "label": "SECURITY", "val": 100, "max": 100 }
                }
            };
            renderReport(todayData);
        };
    </script>
</body>
</html>
